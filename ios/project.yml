name: StockSwing
options:
  bundleIdPrefix: com.stockswing
  deploymentTarget:
    iOS: "16.0"

settings:
  SWIFT_VERSION: "5.9"

targets:
  StockSwing:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: StockSwing
        excludes:
          - "**/*.md"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.stockswing.app
      INFOPLIST_FILE: StockSwing/Info.plist
      DEVELOPMENT_TEAM: ""
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
